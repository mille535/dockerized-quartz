name: Build and Push Docker Image (Alpine)
on:
  push:
    branches:
      - alpine  # Changed from 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - alpine  # Changed from 'main'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/dockerized-quartz

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with 'alpine' on alpine branch
            type=raw,value=alpine,enable={{is_default_branch}}
            # Tag with version-alpine on tags (e.g., v1.0.0 -> 1.0.0-alpine)
            type=semver,pattern={{version}}-alpine
            # Tag with major.minor-alpine on tags (e.g., v1.0.0 -> 1.0-alpine)
            type=semver,pattern={{major}}.{{minor}}-alpine
            # Tag with major-alpine on tags (e.g., v1.0.0 -> 1-alpine)
            type=semver,pattern={{major}}-alpine
            # Tag with branch name-alpine
            type=ref,event=branch,suffix=-alpine
            # Tag with PR number-alpine
            type=ref,event=pr,suffix=-alpine
            # Tag with commit SHA-alpine
            type=sha,prefix={{branch}}-,suffix=-alpine

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-alpine
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-alpine,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"
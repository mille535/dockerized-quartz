name: Build and Push OCI Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    # Use a runner with Docker access (adjust label as necessary for your runner setup)
    runs-on: ubuntu-latest
    env:
      DOCKER_HOST: tcp://dind:2375  # Add this
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Forgejo Container registry
        # Use the GITHUB_TOKEN provided by Forgejo actions
        run: docker login ${{ secrets.REGISTRY_URL }} -u ${{ github.actor }} -p ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          # Define REGISTRY_URL as a repository secret with your Forgejo instance URL (e.g., forgejo.example.com)
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

      - name: Build the OCI image
        run: |
          IMAGE_TAG=${{ secrets.REGISTRY_URL }}/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          docker build -t $IMAGE_TAG .
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      
      - name: Push the OCI image
        run: |
          IMAGE_TAG=${{ secrets.REGISTRY_URL }}/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          docker push $IMAGE_TAG
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
